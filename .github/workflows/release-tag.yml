# Creates a GitHub Release + semver tag on main so SwiftPM / Swift Playgrounds
# can resolve the package. Run from: Actions → release-tag → Run workflow.
name: release-tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to create (e.g. 1.1.1)"
        required: true
        default: "1.1.1"
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.inputs.tag;
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `v${tag}`,
              generate_release_notes: true,
            });
            core.info(`Created ${release.data.html_url}`);
